# Applied automatically by Docker Compose in development.
# Never used in production deploys.
services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  frontend:
    ports:
      - "3000:3000"
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["pnpm", "dev", "--host"]

  nginx:
    command: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/project/nginx.dev.conf"]
