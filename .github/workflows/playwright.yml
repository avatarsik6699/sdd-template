name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Create .env from example
      run: cp .env.example .env

    # Spin up the stack using the CI-specific override (production frontend
    # build + published port) and wait for all healthchecks to pass.
    - name: Start Docker stack
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait --wait-timeout 600

    - name: Dump Docker state on failure
      if: failure()
      run: |
        docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
        docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=300

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10
        run_install: false

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v4
      name: Setup pnpm cache
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      working-directory: ./frontend
      run: pnpm install

    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: pnpm test:e2e:install

    - name: Run Playwright tests
      working-directory: ./frontend
      run: pnpm test:e2e
      env:
        PLAYWRIGHT_BASE_URL: http://localhost:3000

    - name: Stop Docker stack
      if: always()
      run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
