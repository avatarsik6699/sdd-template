name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Template Marker Guard ─────────────────────────────────────────────────
  # This repository is a scaffold template, so marker tokens are expected.
  # Fail only if required markers disappear from canonical template files.
  placeholder-guard:
    name: Template Markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure required template markers still exist
        run: |
          grep -q '\[PROJECT_NAME\]' app/main.py
          grep -q '\[PROJECT_DESCRIPTION\]' app/main.py
          grep -q '\[PROJECT_NAME\]' frontend/app/pages/login.vue
          grep -q '\[PROJECT_NAME\]' frontend/app/pages/dashboard.vue
          grep -q '\[PROJECT_NAME\]' frontend/app/widgets/sidebar/ui/sidebar-nav.vue
          grep -q '\[PROJECT_NAME\]' docs/SPEC.md
          grep -q '\[PROJECT_NAME\]' docs/STATE.md

  # ── Backend Lint ──────────────────────────────────────────────────────────
  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install backend deps
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check app/ tests/

  # ── Backend Tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: myapp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://app_user:ci_password@localhost:5432/myapp_test
          SECRET_KEY: ci-test-secret-key
        run: uv run alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://app_user:ci_password@localhost:5432/myapp_test
          SECRET_KEY: ci-test-secret-key
        run: uv run pytest tests/ -v

  # ── Frontend (Lint + Tests) ───────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Nuxt prepare (generate types)
        working-directory: frontend
        run: pnpm nuxt prepare

      - name: ESLint
        working-directory: frontend
        run: pnpm lint

      - name: TypeScript check
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Vitest
        working-directory: frontend
        run: pnpm vitest run

  # ── Frontend E2E (Required on PR) ─────────────────────────────────────────
  e2e:
    name: E2E (Chromium)
    runs-on: ubuntu-latest
    needs: [test-backend, frontend]
    env:
      COMPOSE_PROJECT_NAME: e2e-ci
    steps:
      - uses: actions/checkout@v4

      - name: Mark timing start
        run: echo "E2E_T0=$(date +%s)" >> "$GITHUB_ENV"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Prepare project environment
        run: cp .env.example .env

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Mark frontend install complete
        run: echo "E2E_T_INSTALL_DONE=$(date +%s)" >> "$GITHUB_ENV"

      - name: Enforce E2E anti-flake policy
        working-directory: frontend
        run: pnpm test:e2e:lint

      - name: Install Playwright Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Mark browser install complete
        run: echo "E2E_T_BROWSER_DONE=$(date +%s)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image (Buildx + GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          load: true
          tags: e2e-ci-backend:latest
          cache-from: type=gha,scope=e2e-backend
          cache-to: type=gha,mode=max,scope=e2e-backend,ignore-error=true

      - name: Build frontend image (Buildx + GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          load: true
          tags: e2e-ci-frontend:latest
          cache-from: type=gha,scope=e2e-frontend
          cache-to: type=gha,mode=max,scope=e2e-frontend,ignore-error=true

      - name: Mark image build complete
        run: echo "E2E_T_BUILD_DONE=$(date +%s)" >> "$GITHUB_ENV"

      - name: Reset any previous compose state
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --volumes --remove-orphans || true

      - name: Start full Docker stack (CI mode, no rebuild)
        run: |
          set -euo pipefail
          if ! docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --no-build --wait --wait-timeout 420; then
            echo "::group::docker compose ps"
            docker compose -f docker-compose.yml -f docker-compose.ci.yml ps || true
            echo "::endgroup::"
            echo "::group::db logs"
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color db || true
            echo "::endgroup::"
            echo "::group::backend logs"
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color backend || true
            echo "::endgroup::"
            echo "::group::frontend logs"
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color frontend || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Warm frontend and backend endpoints
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 120))
          while (( SECONDS < deadline )); do
            if curl -fsS http://localhost:3000/login >/dev/null && \
               curl -fsS http://localhost:8000/api/v1/health >/dev/null; then
              echo "Stack is healthy and warm."
              exit 0
            fi
            echo "Waiting for warm endpoints (${SECONDS}s elapsed)..."
            sleep 2
          done

          echo "::group::docker compose ps"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps || true
          echo "::endgroup::"
          echo "::group::backend logs"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color backend || true
          echo "::endgroup::"
          echo "::group::frontend logs"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color frontend || true
          echo "::endgroup::"
          exit 1

      - name: Mark stack ready
        run: echo "E2E_T_STACK_READY=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run Alembic migrations inside backend container
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T backend uv run alembic upgrade head

      - name: Mark migrations complete
        run: echo "E2E_T_MIGRATIONS_DONE=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run Playwright E2E (Chromium gate)
        working-directory: frontend
        env:
          CI: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: |
          start="$(date +%s)"
          echo "E2E_T_TEST_START=$start" >> "$GITHUB_ENV"
          set +e
          pnpm test:e2e --project=chromium
          status="$?"
          end="$(date +%s)"
          echo "E2E_T_TEST_DONE=$end" >> "$GITHUB_ENV"
          exit "$status"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn

      - name: E2E timing summary
        if: always()
        shell: bash
        run: |
          now="$(date +%s)"
          t0="${E2E_T0:-$now}"
          t_install="${E2E_T_INSTALL_DONE:-$now}"
          t_browser="${E2E_T_BROWSER_DONE:-$now}"
          t_build="${E2E_T_BUILD_DONE:-$now}"
          t_ready="${E2E_T_STACK_READY:-$now}"
          t_migrate="${E2E_T_MIGRATIONS_DONE:-$now}"
          t_test_start="${E2E_T_TEST_START:-$now}"
          t_test_done="${E2E_T_TEST_DONE:-$now}"
          echo "E2E timing summary (seconds):"
          echo "  Frontend install:        $((t_install - t0))"
          echo "  Browser install:         $((t_browser - t_install))"
          echo "  Buildx image build:      $((t_build - t_browser))"
          echo "  Stack readiness:         $((t_ready - t_build))"
          echo "  Migrations:              $((t_migrate - t_ready))"
          echo "  Playwright tests:        $((t_test_done - t_test_start))"
          echo "  Total e2e job elapsed:   $((t_test_done - t0))"

      - name: Show docker compose status
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml ps

      - name: Stop docker compose stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --volumes

  # ── Docker Build ──────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, frontend, e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t my-project-backend:ci .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t my-project-frontend:ci ./frontend
