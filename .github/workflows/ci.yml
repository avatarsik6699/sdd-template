name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-contract:
    name: Workflow Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install maintainer deps
        run: uv sync --dev

      - name: Validate workflow release structure
        run: uv run sdd release validate --scope workflow --template fastapi-nuxt --skip-tag-checks

      - name: Run workflow ownership tests
        run: uv run pytest tests/test_repo_layout.py -v

  template-contract:
    name: Template Contract
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template_id: [fastapi-nuxt, fastapi-react-router]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install maintainer deps
        run: uv sync --dev

      - name: Validate template release structure
        run: uv run sdd release validate --scope template --template ${{ matrix.template_id }} --skip-tag-checks

      - name: Ensure required template markers still exist
        run: |
          grep -q '\[PROJECT_NAME\]' templates/${{ matrix.template_id }}/source/app/main.py
          grep -q '\[PROJECT_NAME\]' templates/${{ matrix.template_id }}/source/docs/SPEC.md
          grep -q '\[PROJECT_NAME\]' templates/${{ matrix.template_id }}/source/docs/STATE.md

          if [ "${{ matrix.template_id }}" = "fastapi-nuxt" ]; then
            grep -q '\[PROJECT_NAME\]' templates/fastapi-nuxt/source/frontend/app/pages/login.vue
            grep -q '\[PROJECT_NAME\]' templates/fastapi-nuxt/source/frontend/app/pages/dashboard.vue
            grep -q '\[PROJECT_NAME\]' templates/fastapi-nuxt/source/frontend/app/widgets/sidebar/ui/sidebar-nav.vue
          else
            grep -q '\[PROJECT_NAME\]' templates/fastapi-react-router/source/frontend/app/routes/home.tsx
            grep -q '\[PROJECT_NAME\]' templates/fastapi-react-router/source/frontend/app/routes/login.tsx
            grep -q '\[PROJECT_NAME\]' templates/fastapi-react-router/source/frontend/app/routes/dashboard.tsx
          fi

  integration-cli:
    name: Integration CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install maintainer deps
        run: uv sync --dev

      - name: Run integration CLI tests
        run: uv run pytest tests/test_sdd_cli.py -v

  template-backend-lint:
    name: Template Backend Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template_id: [fastapi-nuxt, fastapi-react-router]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install backend deps
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check templates/${{ matrix.template_id }}/source/app templates/${{ matrix.template_id }}/source/tests

  template-backend-tests:
    name: Template Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template_id: [fastapi-nuxt, fastapi-react-router]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: myapp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install deps
        run: uv sync --dev

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://app_user:ci_password@localhost:5432/myapp_test
          SECRET_KEY: ci-test-secret-key
          PYTHONPATH: ${{ github.workspace }}/templates/${{ matrix.template_id }}/source
        run: uv run alembic -c templates/${{ matrix.template_id }}/source/alembic.ini upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://app_user:ci_password@localhost:5432/myapp_test
          SECRET_KEY: ci-test-secret-key
          PYTHONPATH: ${{ github.workspace }}/templates/${{ matrix.template_id }}/source
        run: uv run pytest templates/${{ matrix.template_id }}/source/tests/test_config.py templates/${{ matrix.template_id }}/source/tests/test_health.py templates/${{ matrix.template_id }}/source/tests/test_auth_api.py -v

  template-frontend:
    name: Template Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template_id: [fastapi-nuxt, fastapi-react-router]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: templates/${{ matrix.template_id }}/source/frontend/pnpm-lock.yaml

      - name: Install deps
        working-directory: templates/${{ matrix.template_id }}/source/frontend
        run: pnpm install --frozen-lockfile

      - name: Framework prepare
        working-directory: templates/${{ matrix.template_id }}/source/frontend
        run: |
          if [ "${{ matrix.template_id }}" = "fastapi-nuxt" ]; then
            pnpm nuxt prepare
          else
            echo "No explicit framework prepare step required for ${{ matrix.template_id }}"
          fi

      - name: ESLint
        working-directory: templates/${{ matrix.template_id }}/source/frontend
        run: pnpm lint

      - name: TypeScript check
        working-directory: templates/${{ matrix.template_id }}/source/frontend
        run: |
          if [ "${{ matrix.template_id }}" = "fastapi-nuxt" ]; then
            pnpm exec tsc --noEmit
          else
            pnpm run typecheck
          fi

      - name: Vitest
        working-directory: templates/${{ matrix.template_id }}/source/frontend
        run: pnpm vitest run

  template-image-build:
    name: Template Image Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template_id: [fastapi-nuxt, fastapi-react-router]
    needs:
      [
        workflow-contract,
        template-contract,
        integration-cli,
        template-backend-lint,
        template-backend-tests,
        template-frontend,
      ]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f templates/${{ matrix.template_id }}/source/Dockerfile.backend -t my-project-backend:${{ matrix.template_id }}-ci templates/${{ matrix.template_id }}/source

      - name: Build frontend image
        run: docker build -f templates/${{ matrix.template_id }}/source/Dockerfile.frontend -t my-project-frontend:${{ matrix.template_id }}-ci templates/${{ matrix.template_id }}/source/frontend
