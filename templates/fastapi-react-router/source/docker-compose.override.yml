# Applied automatically by Docker Compose in development.
# Never used in production deploys.
services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  frontend:
    # Run as the host user so bind-mounted writes (reports, build artifacts) stay owned
    # by the developer on the host. Defaults to 1000:1000, the standard UID on
    # most Linux dev boxes and WSL. Override per-shell:  UID=$(id -u) GID=$(id -g) docker compose up
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["pnpm", "dev"]

  nginx:
    command: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/project/nginx.dev.conf"]
